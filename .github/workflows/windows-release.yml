name: Build installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Windows NSIS
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Install frontend dependencies
        run: npm ci
      - name: Run frontend tests
        run: npm test
      - name: Build NSIS installer
        run: npm run tauri build -- --bundles nsis
      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: Pet-Desk-Windows-NSIS
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 30

  macos:
    name: macOS Universal DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install Rust stable with macOS targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - name: Install frontend dependencies
        run: npm ci
      - name: Run frontend tests
        run: npm test
      - name: Build universal macOS installer
        run: npm run tauri build -- --target universal-apple-darwin --bundles dmg --ci --no-sign
      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: Pet-Desk-macOS-Universal-DMG
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - windows
      - macos
    runs-on: ubuntu-latest
    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: Create release and upload installers
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          release-assets/*
          --repo "${GITHUB_REPOSITORY}"
          --title "${GITHUB_REF_NAME}"
          --generate-notes
          --verify-tag
